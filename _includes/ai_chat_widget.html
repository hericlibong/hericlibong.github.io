<!-- AI Chat Widget -->
{% assign current_lang = page.lang | default: "fr" %}
{% assign chat_i18n = site.data.site_text[current_lang].chatbot %}
<aside
  id="ai-chat-widget"
  class="ai-chat-widget"
  role="dialog"
  aria-modal="false"
  aria-labelledby="ai-chat-title"
  aria-hidden="true"
>
  <header class="ai-chat-header">
    <div class="ai-chat-brand">
      <div class="ai-chat-avatar" aria-hidden="true">🤖</div>
      <div class="ai-chat-brand-text">
        <div id="ai-chat-title" class="ai-chat-title">{{ chat_i18n.title }}</div>
        <div class="ai-chat-subtitle">{{ chat_i18n.subtitle }}</div>
      </div>
    </div>
    <button type="button" class="ai-chat-close" onclick="toggleChatWidget()" aria-label="{{ chat_i18n.close_label }}">×</button>
  </header>

  <div class="ai-chat-body">
    <div class="ai-chat-messages" id="ai-chat-messages" aria-live="polite" aria-label="Conversation">
      <article class="ai-chat-message ai-assistant">
        <div class="ai-chat-message-content">
          {{ chat_i18n.hello }}
        </div>
      </article>
    </div>

    <form class="ai-chat-input-area" onsubmit="sendChatMessage(event)">
      <label class="ai-chat-sr-only" for="ai-chat-input">{{ chat_i18n.input_label }}</label>
      <input
        type="text"
        id="ai-chat-input"
        class="ai-chat-input"
        placeholder="{{ chat_i18n.input_placeholder }}"
        autocomplete="off"
      >
      <button type="submit" class="ai-chat-send" id="ai-chat-send" aria-label="{{ chat_i18n.send_label }}">
        <span aria-hidden="true">➤</span>
      </button>
    </form>
  </div>
</aside>

<button
  type="button"
  class="ai-chat-toggle"
  onclick="toggleChatWidget()"
  aria-label="{{ chat_i18n.open_label }}"
  aria-expanded="false"
>
  <span class="ai-chat-toggle-icon" aria-hidden="true">🤖</span>
  <span class="ai-chat-toggle-text">{{ chat_i18n.title }}</span>
</button>

<style>
.ai-chat-widget {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: min(390px, calc(100vw - 1.5rem));
  height: min(560px, 72vh);
  background: var(--page-col);
  border: 1px solid var(--navbar-border-col);
  border-radius: 14px;
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
  display: none;
  z-index: 10000;
  overflow: hidden;
  font-family: var(--body-font);
  color: var(--text-col);
}

.ai-chat-widget.active {
  display: flex;
  flex-direction: column;
}

.ai-chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  color: #fff;
  background: linear-gradient(140deg, var(--hover-col), #0066cc);
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.ai-chat-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.ai-chat-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.17);
  font-size: 1.15rem;
}

.ai-chat-brand-text {
  min-width: 0;
}

.ai-chat-title {
  margin: 0;
  font-family: var(--header-font);
  font-size: 0.95rem;
  line-height: 1.2;
  font-weight: 700;
}

.ai-chat-subtitle {
  margin-top: 2px;
  font-size: 0.72rem;
  opacity: 0.9;
}

.ai-chat-close {
  border: none;
  background: transparent;
  color: #fff;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  font-size: 1.25rem;
  line-height: 1;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.ai-chat-close:hover,
.ai-chat-close:focus-visible {
  background: rgba(255, 255, 255, 0.15);
}

.ai-chat-body {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--page-col);
}

.ai-chat-messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ai-chat-message {
  max-width: 90%;
  border-radius: 12px;
  padding: 10px 12px;
  line-height: 1.45;
  font-size: 0.9rem;
  box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
}

.ai-chat-message.ai-user {
  align-self: flex-end;
  background: var(--navbar-col);
  border: 1px solid var(--navbar-border-col);
}

.ai-chat-message.ai-assistant {
  align-self: flex-start;
  background: #f4f9ff;
  border: 1px solid #dcecff;
}

.ai-chat-message-content {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.ai-chat-message-content p,
.ai-chat-message-content ul,
.ai-chat-message-content ol,
.ai-chat-message-content h1,
.ai-chat-message-content h2,
.ai-chat-message-content h3,
.ai-chat-message-content h4 {
  margin: 0.45rem 0 0;
}

.ai-chat-message-content p:first-child,
.ai-chat-message-content ul:first-child,
.ai-chat-message-content ol:first-child,
.ai-chat-message-content h1:first-child,
.ai-chat-message-content h2:first-child,
.ai-chat-message-content h3:first-child,
.ai-chat-message-content h4:first-child {
  margin-top: 0;
}

.ai-chat-message-content ul {
  padding-left: 1.2rem;
}

.ai-chat-message-content ol {
  padding-left: 1.3rem;
}

.ai-chat-message-content h1,
.ai-chat-message-content h2,
.ai-chat-message-content h3,
.ai-chat-message-content h4 {
  font-family: var(--header-font);
  line-height: 1.25;
  font-weight: 700;
}

.ai-chat-message-content h1 { font-size: 1.05rem; }
.ai-chat-message-content h2 { font-size: 1rem; }
.ai-chat-message-content h3,
.ai-chat-message-content h4 { font-size: 0.95rem; }

.ai-chat-message-content .ai-chat-divider {
  border: 0;
  border-top: 1px solid #d3e3f6;
  margin: 0.5rem 0;
}

.ai-chat-message-content code {
  font-size: 0.86em;
  background: rgba(0, 0, 0, 0.08);
  border-radius: 4px;
  padding: 0.05rem 0.25rem;
}

.ai-chat-message-content a {
  color: var(--link-col);
  text-decoration: underline;
}

.ai-chat-input-area {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--navbar-border-col);
  background: #fff;
}

.ai-chat-input {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--navbar-border-col);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.88rem;
  line-height: 1.3;
  font-family: var(--body-font);
  color: var(--text-col);
  background: #fff;
}

.ai-chat-input::placeholder {
  color: #8a8a8a;
}

.ai-chat-input:focus-visible {
  outline: none;
  border-color: var(--hover-col);
  box-shadow: 0 0 0 3px rgba(0, 138, 255, 0.16);
}

.ai-chat-send {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: none;
  background: var(--hover-col);
  color: #fff;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

.ai-chat-send:hover,
.ai-chat-send:focus-visible {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0, 133, 161, 0.35);
}

.ai-chat-send:disabled {
  opacity: 0.7;
  cursor: wait;
  transform: none;
  box-shadow: none;
}

.ai-chat-toggle {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 62px;
  height: 62px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(140deg, var(--hover-col), #0066cc);
  color: #fff;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
  z-index: 9999;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.ai-chat-toggle:hover,
.ai-chat-toggle:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28);
}

.ai-chat-toggle-icon {
  font-size: 1.35rem;
  line-height: 1;
}

.ai-chat-toggle-text {
  margin-top: 2px;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  line-height: 1;
}

.ai-chat-widget.active + .ai-chat-toggle {
  display: none;
}

.ai-chat-sr-only {
  border: 0;
  clip: rect(0 0 0 0);
  height: 1px;
  margin: -1px;
  overflow: hidden;
  padding: 0;
  position: absolute;
  width: 1px;
}

.typing-dots {
  display: inline-flex;
  gap: 5px;
  align-items: center;
}

.typing-dots span {
  font-size: 0.9rem;
  opacity: 0.4;
  animation: ai-chat-typing 1.2s infinite ease-in-out;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.12s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.24s;
}

@keyframes ai-chat-typing {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
  40% { transform: translateY(-2px); opacity: 1; }
}

@media (max-width: 575px) {
  .ai-chat-widget {
    right: 0.75rem;
    bottom: 0.75rem;
    width: calc(100vw - 1.5rem);
    height: min(70vh, 620px);
    border-radius: 12px;
  }

  .ai-chat-toggle {
    right: 0.75rem;
    bottom: 0.75rem;
  }

  .ai-chat-message {
    max-width: 95%;
    font-size: 0.88rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  .ai-chat-send,
  .ai-chat-toggle,
  .typing-dots span {
    transition: none;
    animation: none;
  }
}
</style>

<script>
const AI_CHAT_CONFIG = {
  enableMarkdown: true,
  wordByWord: {
    enabled: true,
    wordsPerTick: 1,
    tickMs: 52
  }
};

const aiChatState = {
  isSending: false,
  activeAnimation: null
};

function toggleChatWidget() {
  const widget = document.getElementById('ai-chat-widget');
  const toggle = document.querySelector('.ai-chat-toggle');
  const input = document.getElementById('ai-chat-input');

  if (!widget || !toggle) return;

  const isOpen = widget.classList.toggle('active');
  widget.setAttribute('aria-hidden', String(!isOpen));
  toggle.setAttribute('aria-expanded', String(isOpen));

  if (isOpen) {
    scrollChatToBottom(true);
    window.setTimeout(() => input && input.focus(), 60);
  } else {
    cancelActiveAnimation(true);
  }
}

async function sendChatMessage(event) {
  if (event) event.preventDefault();

  const input = document.getElementById('ai-chat-input');
  const sendButton = document.getElementById('ai-chat-send');
  if (!input || aiChatState.isSending) return;

  const message = input.value.trim();
  if (!message) return;

  cancelActiveAnimation(true);
  addChatMessage(message, 'ai-user', { skipAnimation: true });
  input.value = '';
  input.focus();

  aiChatState.isSending = true;
  setSendingState(true, input, sendButton);
  addTypingIndicator();
  scrollChatToBottom(true);

  await callAIWorker(message);
}

async function callAIWorker(message) {
  try {
    const workerUrl = "{{ site.mistral_api_url }}";
    const corpusUrl = "{{ site.url | absolute_url }}{% if current_lang == 'en' %}/en{% endif %}/assets/data/ai_corpus.json";

    const response = await fetch(workerUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Origin': window.location.origin
      },
      body: JSON.stringify({
        message: message,
        corpusUrl: corpusUrl
      })
    });

    const data = await response.json();

    removeTypingIndicator();
    if (data.success && data.response) {
      const normalizedResponse = normalizeAssistantResponse(data.response);
      await addChatMessage(
        normalizedResponse || "{{ chat_i18n.no_response }}",
        'ai-assistant'
      );
    } else {
      await addChatMessage(
        data.error || "{{ chat_i18n.worker_error }}",
        'ai-assistant',
        { skipAnimation: true }
      );
    }
  } catch (error) {
    console.error('Error calling AI Worker:', error);
    removeTypingIndicator();
    await addChatMessage(
      "{{ chat_i18n.network_error }}",
      'ai-assistant',
      { skipAnimation: true }
    );
  } finally {
    const input = document.getElementById('ai-chat-input');
    const sendButton = document.getElementById('ai-chat-send');
    aiChatState.isSending = false;
    setSendingState(false, input, sendButton);
    scrollChatToBottom(true);
  }
}

function setSendingState(isSending, input, sendButton) {
  if (input) input.disabled = isSending;
  if (sendButton) sendButton.disabled = isSending;
}

async function addChatMessage(message, className, options = {}) {
  const messagesContainer = document.getElementById('ai-chat-messages');
  if (!messagesContainer) return;

  const shouldAutoScroll = isUserNearBottom(messagesContainer);
  const messageElement = document.createElement('article');
  messageElement.className = `ai-chat-message ${className}`;

  const contentElement = document.createElement('div');
  contentElement.className = 'ai-chat-message-content';
  messageElement.appendChild(contentElement);
  messagesContainer.appendChild(messageElement);

  const isAssistantMessage = className === 'ai-assistant';
  if (isAssistantMessage && shouldAnimateAssistantMessage(options)) {
    await animateAssistantMessage(message, contentElement, shouldAutoScroll);
  } else {
    contentElement.innerHTML = renderMessageHtml(message, isAssistantMessage);
  }

  scrollChatToBottom(shouldAutoScroll);
}

function shouldAnimateAssistantMessage(options) {
  if (options.skipAnimation) return false;
  if (!AI_CHAT_CONFIG.wordByWord.enabled) return false;
  return !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
}

function animateAssistantMessage(message, contentElement, shouldAutoScroll) {
  cancelActiveAnimation(true);
  const animationText = markdownToAnimationText(message);
  const animationState = {
    cancelled: false,
    renderFinal: false,
    message: message,
    contentElement: contentElement
  };
  aiChatState.activeAnimation = animationState;

  const tokens = splitMessageIntoTokens(animationText);
  let currentIndex = 0;
  let currentText = '';

  return new Promise((resolve) => {
    const step = () => {
      if (animationState.cancelled) {
        if (animationState.renderFinal && animationState.contentElement) {
          animationState.contentElement.innerHTML = renderMessageHtml(animationState.message, true);
        }
        if (aiChatState.activeAnimation === animationState) aiChatState.activeAnimation = null;
        return resolve();
      }

      const nextIndex = Math.min(
        currentIndex + AI_CHAT_CONFIG.wordByWord.wordsPerTick,
        tokens.length
      );

      while (currentIndex < nextIndex) {
        currentText += tokens[currentIndex];
        currentIndex += 1;
      }

      contentElement.innerHTML = renderAnimationHtml(currentText);
      scrollChatToBottom(shouldAutoScroll);

      if (currentIndex < tokens.length) {
        window.setTimeout(step, AI_CHAT_CONFIG.wordByWord.tickMs);
      } else {
        contentElement.innerHTML = renderMessageHtml(message, true);
        if (aiChatState.activeAnimation === animationState) aiChatState.activeAnimation = null;
        resolve();
      }
    };

    step();
  });
}

function splitMessageIntoTokens(message) {
  return message.match(/\S+\s*|\n+/g) || [message];
}

function renderMessageHtml(message, allowMarkdown) {
  if (!allowMarkdown || !AI_CHAT_CONFIG.enableMarkdown) {
    return escapeHtml(message).replace(/\n/g, '<br>');
  }

  return markdownToSafeHtml(message);
}

function renderAnimationHtml(message) {
  return escapeHtml(message).replace(/\n/g, '<br>');
}

function cancelActiveAnimation(renderFinal) {
  if (!aiChatState.activeAnimation) return;
  aiChatState.activeAnimation.renderFinal = Boolean(renderFinal);
  aiChatState.activeAnimation.cancelled = true;
}

function normalizeAssistantResponse(raw) {
  let text = String(raw ?? '')
    .replace(/\r\n/g, '\n')
    .replace(/\u00A0/g, ' ')
    .trim();

  text = text.replace(/^```(?:markdown|md|text)?\s*/i, '');
  text = text.replace(/\s*```$/i, '');
  text = text.replace(/^[-*_]{3,}\s*$/gm, '');
  text = text.replace(/\n{3,}/g, '\n\n');

  return text.trim();
}

function markdownToAnimationText(rawText) {
  let text = normalizeAssistantResponse(rawText);
  text = text.replace(/```[\w-]*\n([\s\S]*?)```/g, '$1');
  text = text.replace(/^#{1,6}\s+/gm, '');
  text = text.replace(/^>\s?/gm, '');
  text = text.replace(/^[-*]\s+/gm, '• ');
  text = text.replace(/^\d+\.\s+/gm, '');
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '$1');
  text = text.replace(/`([^`]+)`/g, '$1');
  text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
  text = text.replace(/\*([^*]+)\*/g, '$1');
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}

function markdownToSafeHtml(rawText) {
  const text = normalizeAssistantResponse(rawText).replace(/\r\n/g, '\n');
  const lines = text.split('\n');
  const chunks = [];
  let listBuffer = [];
  let listType = '';

  const flushList = () => {
    if (!listBuffer.length) return;
    const tagName = listType || 'ul';
    chunks.push(
      `<${tagName}>${listBuffer.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</${tagName}>`
    );
    listBuffer = [];
    listType = '';
  };

  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) {
      flushList();
      return;
    }

    if (/^[-*_]{3,}$/.test(trimmed)) {
      flushList();
      chunks.push('<hr class="ai-chat-divider">');
      return;
    }

    const headingMatch = trimmed.match(/^(#{1,4})\s+(.+)$/);
    if (headingMatch) {
      flushList();
      const level = headingMatch[1].length;
      chunks.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      return;
    }

    const unorderedMatch = trimmed.match(/^[-*]\s+(.+)$/);
    const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (unorderedMatch || orderedMatch) {
      const currentType = orderedMatch ? 'ol' : 'ul';
      if (listType && listType !== currentType) flushList();
      listType = currentType;
      listBuffer.push((orderedMatch || unorderedMatch)[1]);
      return;
    }

    flushList();
    chunks.push(`<p>${renderInlineMarkdown(trimmed)}</p>`);
  });

  flushList();
  return chunks.join('') || `<p>${escapeHtml(rawText)}</p>`;
}

function renderInlineMarkdown(text) {
  let safe = escapeHtml(text);
  safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
  safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  safe = safe.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (match, label, url) => {
    const safeUrl = sanitizeUrl(url);
    if (!safeUrl) return escapeHtml(label);
    return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  return safe;
}

function sanitizeUrl(url) {
  try {
    const parsed = new URL(url, window.location.origin);
    if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
      return escapeHtml(parsed.href);
    }
  } catch (error) {
    return '';
  }
  return '';
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function addTypingIndicator() {
  const messagesContainer = document.getElementById('ai-chat-messages');
  if (!messagesContainer) return;
  removeTypingIndicator();

  const typingIndicator = document.createElement('article');
  typingIndicator.className = 'ai-chat-message ai-assistant';
  typingIndicator.id = 'typing-indicator';
  typingIndicator.innerHTML =
    '<div class="ai-chat-message-content"><div class="typing-dots" aria-hidden="true"><span>●</span><span>●</span><span>●</span></div></div>';
  messagesContainer.appendChild(typingIndicator);
}

function removeTypingIndicator() {
  const indicator = document.getElementById('typing-indicator');
  if (indicator) indicator.remove();
}

function isUserNearBottom(messagesContainer) {
  const distanceFromBottom =
    messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight;
  return distanceFromBottom < 48;
}

function scrollChatToBottom(force = false) {
  const messagesContainer = document.getElementById('ai-chat-messages');
  if (!messagesContainer) return;
  if (!force && !isUserNearBottom(messagesContainer)) return;

  window.requestAnimationFrame(() => {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  });
}
</script>
